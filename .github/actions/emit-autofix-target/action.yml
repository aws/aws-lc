name: "emit-autofix-target"
description: "Upload the (integration, version) pair of a failed integration job for autofix to consume."
inputs:
  integration:
    description: "Integration name"
    required: true
  version:
    description: "Version/branch the runner ran with (empty for flat patch dirs)."
    required: false
    default: ""
  failed-integration:
    description: 'Identifier for the failing matrix row (e.g. "postgresql-x86_64"). Used to keep artifact names unique across the matrix.'
    required: true
runs:
  using: "composite"
  steps:
    - shell: bash
      run: printf '%s\t%s\n' "${{ inputs.integration }}" "${{ inputs.version }}" > autofix-target.txt
    - uses: actions/upload-artifact@v4
      with:
        name: autofix-target-${{ inputs.failed-integration }}
        path: autofix-target.txt
