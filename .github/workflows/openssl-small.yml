# Validates the OPENSSL_SMALL build: it must shrink a statically-linked
# consumer binary and must still pass the full test suite.
#
# The size-reduction job is intentionally advisory (continue-on-error). The
# thresholds are calibrated from measured CI runs (see the matrix below), but
# have not yet been observed across enough runs to trust as a blocking gate.
# Once the numbers prove stable, drop `continue-on-error` and/or mark this job
# as a required check in branch protection. The small-tests jobs are real
# correctness gates and should block.
name: OPENSSL_SMALL
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
env:
  GOPROXY: https://proxy.golang.org,direct
permissions:
  contents: read

jobs:
  size-reduction:
    if: github.repository_owner == 'aws'
    name: OPENSSL_SMALL size reduction (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Minimum static-link size reduction expected from OPENSSL_SMALL vs the
        # default build, measured on the tests/binary-size consumer. Thresholds
        # are set conservatively below the measured values to allow for
        # compiler/runner variance:
        #
        # - x86_64: measured 43.7% (clang -O2, x86_64 Linux). OPENSSL_SMALL
        #   implies only MY_ASSEMBLER_IS_TOO_OLD_FOR_512AVX, not
        #   MY_ASSEMBLER_IS_TOO_OLD_FOR_ADX_AVX2, so the ADX/AVX2/BMI2 code
        #   (curve25519 s2n-bignum, RSA/DH mulx Montgomery, x4-batched Keccak)
        #   remains in the build (#3355).
        # - aarch64: measured 31%. The default build links both variants of
        #   every s2n-bignum EC operation (~500 KB), the nistz256 table
        #   (~150 KB), and the P-384/P-521 implementations and tables; the
        #   OPENSSL_SMALL build has none of these.
        include:
          - { name: "x86_64 Linux",  runner: ubuntu-latest,    expected_reduction_percent: 35 }
          - { name: "aarch64 Linux", runner: ubuntu-24.04-arm, expected_reduction_percent: 20 }
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -o Acquire::Languages=none -o Acquire::Translation=none
          sudo apt-get -y --no-install-recommends install cmake clang ninja-build golang
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
      - name: Build libcrypto.a (default)
        run: |
          cmake -GNinja -B build-default -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=0 -DBUILD_TESTING=OFF
          cmake --build build-default --target crypto
      - name: Build libcrypto.a (OPENSSL_SMALL)
        run: |
          cmake -GNinja -B build-small -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=0 -DBUILD_TESTING=OFF -DOPENSSL_SMALL=ON
          cmake --build build-small --target crypto
      - name: Build libcrypto.a (OPENSSL_SMALL, section-GC)
        # Same as build-small but compiled with -ffunction-sections
        # -fdata-sections, so --gc-sections can strip at function granularity
        # inside bcm.c.o. This mirrors how aws-lc-rs (CcBuilder) compiles the
        # library, and is the configuration where anchor-driven retention is
        # measurable: without it, any reference into bcm.c.o retains the whole
        # object and masks what the anchors actually pin.
        run: |
          cmake -GNinja -B build-small-gc -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=0 -DBUILD_TESTING=OFF -DOPENSSL_SMALL=ON \
            -DCMAKE_C_FLAGS="-ffunction-sections -fdata-sections" \
            -DCMAKE_CXX_FLAGS="-ffunction-sections -fdata-sections"
          cmake --build build-small-gc --target crypto
      - name: Link consumer against each libcrypto and compare
        env:
          EXPECTED_REDUCTION_PERCENT: ${{ matrix.expected_reduction_percent }}
        run: |
          set -euo pipefail
          common="-O2 -I include -ffunction-sections -fdata-sections"
          libs="-lpthread -ldl -lm -Wl,--gc-sections -s"
          clang $common tests/binary-size/main.c build-default/crypto/libcrypto.a $libs -o consumer-default
          clang $common tests/binary-size/main.c build-small/crypto/libcrypto.a   $libs -o consumer-small
          echo "Sanity: run the OPENSSL_SMALL-linked consumer"
          ./consumer-small
          size_default=$(stat -c %s consumer-default)
          size_small=$(stat -c %s consumer-small)
          archive_default=$(stat -c %s build-default/crypto/libcrypto.a)
          archive_small=$(stat -c %s build-small/crypto/libcrypto.a)
          if [ "$size_default" -le 0 ]; then
            echo "ERROR: default consumer binary has zero size"
            exit 1
          fi
          reduction=$(( (size_default - size_small) * 100 / size_default ))
          {
            echo "## OPENSSL_SMALL static-link size (${{ matrix.name }})"
            echo ""
            echo "| Build | libcrypto.a | Consumer binary |"
            echo "|-------|-------------|-----------------|"
            echo "| Default | $(numfmt --to=iec "$archive_default") | $(numfmt --to=iec "$size_default") (${size_default} B) |"
            echo "| OPENSSL_SMALL | $(numfmt --to=iec "$archive_small") | $(numfmt --to=iec "$size_small") (${size_small} B) |"
            echo "| **Reduction** | | **${reduction}%** |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "default=${size_default} small=${size_small} reduction=${reduction}%"
          if [ "$reduction" -lt "$EXPECTED_REDUCTION_PERCENT" ]; then
            echo "FAIL: expected >= ${EXPECTED_REDUCTION_PERCENT}% reduction, got ${reduction}%"
            exit 1
          fi
          echo "PASS: ${reduction}% reduction meets the ${EXPECTED_REDUCTION_PERCENT}% threshold"
      - name: Measure GC-enabled consumer and EVP key-parsing anchor
        # Intentionally single-toolchain (clang + GNU ld on Linux, like the
        # whole job): the matrix legs vary only by architecture, so the
        # reported numbers are per-arch, not a gcc cross-check. The anchor
        # cost is a reachability property and ~compiler-independent anyway.
        run: |
          set -euo pipefail
          # Link against the section-GC library build (the aws-lc-rs-like
          # configuration). The EVP-parse variant adds one
          # EVP_parse_public_key call, which anchors asn1_evp_pkey_methods[]
          # (crypto/evp_extra/p_methods.c) and with it every key type's ASN.1
          # machinery -- currently including all of ML-KEM/ML-DSA -- even
          # under full section GC. The delta between the two binaries
          # quantifies what key-parsing consumers inherit. Advisory only; not
          # thresholded (yet).
          common="-O2 -I include -ffunction-sections -fdata-sections"
          libs="-lpthread -ldl -lm -Wl,--gc-sections"
          clang $common tests/binary-size/main.c build-small-gc/crypto/libcrypto.a $libs -o consumer-gc
          clang $common -DAWSLC_SIZE_CHECK_EVP_PARSE tests/binary-size/main.c \
            build-small-gc/crypto/libcrypto.a $libs -o consumer-gc-evp
          echo "Sanity: run the GC-enabled consumers"
          ./consumer-gc
          ./consumer-gc-evp
          size_gc=$(stat -c %s consumer-gc)
          size_gc_evp=$(stat -c %s consumer-gc-evp)
          evp_overhead=$(( size_gc_evp - size_gc ))
          {
            echo "### GC-enabled consumer (OPENSSL_SMALL + section GC, ${{ matrix.name }})"
            echo ""
            echo "| Consumer | Binary size |"
            echo "|----------|-------------|"
            echo "| base | $(numfmt --to=iec "$size_gc") (${size_gc} B) |"
            echo "| base + \`EVP_parse_public_key\` | $(numfmt --to=iec "$size_gc_evp") (${size_gc_evp} B) |"
            echo "| **EVP key-parsing anchor cost** | **$(numfmt --to=iec "$evp_overhead") (${evp_overhead} B)** |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "gc=${size_gc} gc_evp=${size_gc_evp} evp_overhead=${evp_overhead}"
          for bin in consumer-gc consumer-gc-evp; do
            {
              echo "<details><summary>Largest retained symbols: ${bin}</summary>"
              echo ""
              echo '```'
              nm -S --size-sort --radix=d "$bin" | tail -25 | tac
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          done

  small-tests:
    if: github.repository_owner == 'aws'
    name: Tests (OPENSSL_SMALL, ${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Both architectures need coverage: aarch64 is where the s2n-bignum
        # P-256/P-384/P-521 removal and curve25519 variant pinning are the
        # size mechanism; on x86_64, OPENSSL_SMALL sheds AVX-512 code and the
        # dead P-256/P-384/P-521 s2n-bignum objects while curve25519, RSA/DH
        # mulx Montgomery, and x4-batched Keccak stay reachable (#3355).
        include:
          - { name: "x86_64 gcc",    runner: ubuntu-latest,    cc: gcc,   cxx: g++ }
          - { name: "x86_64 clang",  runner: ubuntu-latest,    cc: clang, cxx: clang++ }
          - { name: "aarch64 gcc",   runner: ubuntu-24.04-arm, cc: gcc,   cxx: g++ }
          - { name: "aarch64 clang", runner: ubuntu-24.04-arm, cc: clang, cxx: clang++ }
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -o Acquire::Languages=none -o Acquire::Translation=none
          sudo apt-get -y --no-install-recommends install cmake ninja-build clang gcc g++
          echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"
          echo "CXX=${{ matrix.cxx }}" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.18'
      - uses: actions/checkout@v6
      - name: Build and run tests (OPENSSL_SMALL)
        run: |
          cmake -GNinja -B build-small -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=0 -DOPENSSL_SMALL=ON
          cmake --build build-small --target all
          cmake --build build-small --target run_tests

  small-tests-windows:
    if: github.repository_owner == 'aws'
    # Windows/x86_64 assembles the .asm sources through NASM. OPENSSL_SMALL
    # implies MY_ASSEMBLER_IS_TOO_OLD_FOR_512AVX, which compiles out the whole
    # body of the AVX-512-only .asm files; NASM errors on an object with no
    # output (bugzilla.nasm.us/show_bug.cgi?id=3392738). The Linux legs use
    # gas, which tolerates empty objects, so they cannot catch this -- hence
    # dedicated Windows legs (#3355).
    #
    # The empty-object failure is only reachable through the pre-generated
    # sources (DISABLE_PERL=ON), where NASM itself evaluates the %ifndef
    # guards in generated-src. When Perl is available, perlasm regenerates the
    # .asm with the flag and the scripts emit non-empty ud2/ret stubs instead,
    # so that leg exercises the regeneration path. Cover both.
    name: Tests (OPENSSL_SMALL, x86_64 Windows, ${{ matrix.name }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "perlasm",       disable_perl: "OFF" }
          - { name: "pre-generated", disable_perl: "ON" }
    steps:
      - name: Install NASM
        uses: ilammy/setup-nasm@v1.5.1
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.18'
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        id: clang
        with:
          # VS2026 MSVC STL requires Clang >= 20 (yvals_core.h STL1000).
          version: 20
          env: true
      - name: Setup CMake
        uses: threeal/cmake-action@v2.1.0
        with:
          generator: Ninja
          c-compiler: "C:/Program Files/LLVM/bin/clang.exe"
          cxx-compiler: "C:/Program Files/LLVM/bin/clang++.exe"
          options: |
            CMAKE_SYSTEM_NAME=Windows
            CMAKE_SYSTEM_PROCESSOR=x86_64
            CMAKE_BUILD_TYPE=Release
            OPENSSL_SMALL=ON
            DISABLE_PERL=${{ matrix.disable_perl }}
      - name: Build Project
        run: cmake --build ./build --target all
      - name: Run tests
        run: cmake --build ./build --target run_tests
