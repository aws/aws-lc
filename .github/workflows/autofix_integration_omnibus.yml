name: autofix-integration-omnibus

on:
  workflow_run:
    workflows: ["integration-omnibus"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub Actions run ID of the integration-omnibus run to autofix"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

env:
  TARGET_RUN_ID: ${{ github.event.workflow_run.id || inputs.run_id }}
  AUTOFIX_SCRIPT: ./tests/ci/integration/auto_fix_integrations/auto_fix.sh

jobs:
  recognize:
    name: recognize
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'schedule' &&
       github.event.workflow_run.conclusion == 'failure')
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
    outputs:
      targets: ${{ steps.recognize.outputs.targets }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: recognize
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          chmod +x "$AUTOFIX_SCRIPT"
          targets=$("$AUTOFIX_SCRIPT" recognize "$TARGET_RUN_ID")
          echo "Targets: $targets"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  reason:
    name: reason (${{ matrix.target }})
    needs: recognize
    if: needs.recognize.outputs.targets != '[]' && needs.recognize.outputs.targets != ''
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJSON(needs.recognize.outputs.targets) }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
    env:
      CLAUDE_CODE_USE_BEDROCK: "1"
      AWS_REGION: us-west-2
      ANTHROPIC_DEFAULT_OPUS_MODEL: us.anthropic.claude-opus-4-8
      ANTHROPIC_DEFAULT_SONNET_MODEL: us.anthropic.claude-sonnet-4-6
      ANTHROPIC_DEFAULT_HAIKU_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/configure-aws-credentials
        with:
          roleName: AwsLcGitHubActionIntegrationFailureReasoningRole
      - run: npm install -g @anthropic-ai/claude-code@2.1.161
      # Fetch logs in a token-holding step. The next step runs Claude with no
      # token in its environment, so the agent never has GitHub access.
      - run: |
          set -exo pipefail
          chmod +x "$AUTOFIX_SCRIPT"
          IFS='|' read -r integration version <<< "$TARGET"
          "$AUTOFIX_SCRIPT" fetch-logs "$integration" "$version" "$TARGET_RUN_ID"
        env:
          TARGET: ${{ matrix.target }}
          GH_TOKEN: ${{ github.token }}
      - run: |
          set -exo pipefail
          IFS='|' read -r integration version <<< "$TARGET"
          "$AUTOFIX_SCRIPT" reason "$integration" "$version" "$TARGET_RUN_ID"
        env:
          TARGET: ${{ matrix.target }}
          # Restrict git to standard transports so an injected `git clone ext::…`
          # cannot execute arbitrary commands via git's transport helpers.
          GIT_ALLOW_PROTOCOL: file:git:http:https:ssh
      - uses: actions/upload-artifact@v4
        with:
          name: resolve-patch-${{ matrix.target }}
          path: .resolve-integration-failures/${{ matrix.target }}/out/
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resolve-audit-log-${{ matrix.target }}
          path: .resolve-integration-failures/${{ matrix.target }}/claude-*.log
          if-no-files-found: ignore

  resolve:
    name: resolve (${{ matrix.target }})
    needs: [recognize, reason]
    if: ${{ always() && needs.recognize.outputs.targets != '[]' && needs.recognize.outputs.targets != '' }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJSON(needs.recognize.outputs.targets) }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/configure-aws-credentials
        with:
          roleName: AwsLcGitHubActionIntegrationFailureResolveRole
      - uses: ./.github/actions/fetch-github-token
      - uses: actions/download-artifact@v4
        with:
          name: resolve-patch-${{ matrix.target }}
          path: .resolve-integration-failures/${{ matrix.target }}/out/
        continue-on-error: true
      - run: |
          set -exo pipefail
          chmod +x "$AUTOFIX_SCRIPT"
          IFS='|' read -r integration version <<< "$TARGET"
          "$AUTOFIX_SCRIPT" resolve "$integration" "$version" "$TARGET_RUN_ID"
        env:
          TARGET: ${{ matrix.target }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: us.anthropic.claude-opus-4-8
    