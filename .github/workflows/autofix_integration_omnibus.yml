name: autofix-integration-omnibus

on:
  workflow_run:
    workflows: ["integration-omnibus"]
    types: [completed]

permissions:
  contents: read
  id-token: write
  actions: read

env:
  TARGET_RUN_ID: ${{ github.event.workflow_run.id }}
  AUTOFIX_SCRIPT: ./tests/ci/integration/auto_fix_integrations/auto_fix.sh

jobs:
  recognize:
    name: recognize
    if: >-
      github.event.workflow_run.event == 'schedule' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
    outputs:
      targets: ${{ steps.recognize.outputs.targets }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Recognize failed integration targets
        id: recognize
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          chmod +x "$AUTOFIX_SCRIPT"
          targets=$("$AUTOFIX_SCRIPT" recognize "$TARGET_RUN_ID")
          echo "Targets: $targets"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  reason:
    name: reason (${{ matrix.target }})
    needs: recognize
    if: needs.recognize.outputs.targets != '[]' && needs.recognize.outputs.targets != ''
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJSON(needs.recognize.outputs.targets) }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
    env:
      CLAUDE_CODE_USE_BEDROCK: "1"
      CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1" # Strip secret creds from the env Claude's Bash subprocesses inherit to guard against prompt injection
      AWS_REGION: us-west-2
      ANTHROPIC_DEFAULT_OPUS_MODEL: us.anthropic.claude-opus-4-8
      ANTHROPIC_DEFAULT_SONNET_MODEL: us.anthropic.claude-sonnet-4-6
      ANTHROPIC_DEFAULT_HAIKU_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/configure-aws-credentials
        with:
          roleName: AwsLcGitHubActionIntegrationFailureReasoningRole
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.161
      - name: Install Bash sandbox deps
        # Claude Code's sandbox needs bubblewrap (filesystem/process isolation)
        # and socat (relays Bash traffic through the proxy that enforces the
        # domain allowlist in claude-setings.json). Without them the sandbox can't
        # start.
        run: sudo dnf install -y bubblewrap socat
      - name: Fetch failed-job logs
        run: |
          set -exo pipefail
          chmod +x "$AUTOFIX_SCRIPT"
          IFS='|' read -r integration version <<< "$TARGET"
          "$AUTOFIX_SCRIPT" fetch-logs "$integration" "$version" "$TARGET_RUN_ID"
        env:
          TARGET: ${{ matrix.target }}
          GH_TOKEN: ${{ github.token }}
      # matrix.target is "<integration>|<version>" but auto_fix.sh writes its
      # work dir as "<integration>[-<version>]". Convert | and / to - so the
      # artifact paths below match the dir the script creates (e.g.
      # "openvpn|release/2.6" -> "openvpn-release-2.6"). Derived before the
      # Claude step so the slug is set even if that step fails, keeping the
      # always() audit-log upload pointed at the right path.
      - name: Derive target slug
        id: target
        run: |
          slug=${TARGET//[|\/]/-}
          slug=${slug%-}
          echo "dir=$slug" >> "$GITHUB_OUTPUT"
        env:
          TARGET: ${{ matrix.target }}
      - name: Claude's thinking traces
        run: |
          set -exo pipefail
          IFS='|' read -r integration version <<< "$TARGET"
          "$AUTOFIX_SCRIPT" reason "$integration" "$version" "$TARGET_RUN_ID"
        env:
          TARGET: ${{ matrix.target }}
          # Restrict git to standard protocols so an injected `git clone ext::…`
          # cannot execute arbitrary commands.
          GIT_ALLOW_PROTOCOL: file:git:http:https:ssh
      - uses: actions/upload-artifact@v4
        with:
          name: resolve-patch-${{ steps.target.outputs.dir }}
          path: .resolve-integration-failures/${{ steps.target.outputs.dir }}/out/
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resolve-audit-log-${{ steps.target.outputs.dir }}
          path: .resolve-integration-failures/${{ steps.target.outputs.dir }}/claude-*.log
          if-no-files-found: ignore

  resolve:
    name: resolve (${{ matrix.target }})
    needs: [recognize, reason]
    if: ${{ always() && needs.recognize.outputs.targets != '[]' && needs.recognize.outputs.targets != '' }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJSON(needs.recognize.outputs.targets) }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/configure-aws-credentials
        with:
          roleName: AwsLcGitHubActionIntegrationFailureResolveRole
      - uses: ./.github/actions/fetch-github-token
      # Re-derive the same slug the reason job used, so the artifact download
      # path/name lines up with what was uploaded.
      - name: Derive target slug
        id: target
        run: |
          slug=${TARGET//[|\/]/-}
          slug=${slug%-}
          echo "dir=$slug" >> "$GITHUB_OUTPUT"
        env:
          TARGET: ${{ matrix.target }}
      - name: Download patch from reason job
        uses: actions/download-artifact@v4
        with:
          name: resolve-patch-${{ steps.target.outputs.dir }}
          path: .resolve-integration-failures/${{ steps.target.outputs.dir }}/out/
        continue-on-error: true
      - name: Apply patch and open draft PR
        run: |
          set -exo pipefail
          chmod +x "$AUTOFIX_SCRIPT"
          IFS='|' read -r integration version <<< "$TARGET"
          "$AUTOFIX_SCRIPT" resolve "$integration" "$version" "$TARGET_RUN_ID"
        env:
          TARGET: ${{ matrix.target }}
