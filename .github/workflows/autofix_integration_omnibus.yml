name: autofix-integration-omnibus

on:
  workflow_run:
    workflows: ["integration-omnibus"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub Actions run ID of the integration-omnibus run to autofix"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id || inputs.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: write

env:
  TARGET_RUN_ID: ${{ github.event.workflow_run.id || inputs.run_id }}
  GITHUB_REPO_OWNER: aws
  GITHUB_REPO_NAME: aws-lc
  AUTOFIX_SCRIPT: ./tests/ci/integration/auto_fix_integrations/auto_fix.sh

jobs:
  discover:
    name: discover
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'schedule' &&
       github.event.workflow_run.conclusion == 'failure')
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
    outputs:
      targets: ${{ steps.discover.outputs.targets }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/configure-aws-credentials
        with:
          roleName: AwsLcIntegrationAutofixRole
      - uses: ./.github/actions/fetch-github-token
      - id: discover
        run: |
          set -eo pipefail
          chmod +x "$AUTOFIX_SCRIPT"
          targets=$("$AUTOFIX_SCRIPT" discover "$TARGET_RUN_ID")
          echo "Targets: $targets"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  autofix:
    name: autofix (${{ matrix.target }})
    needs: discover
    if: needs.discover.outputs.targets != '[]' && needs.discover.outputs.targets != ''
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
    env:
      CLAUDE_CODE_USE_BEDROCK: "1"
      AWS_REGION: us-west-2
      ANTHROPIC_DEFAULT_OPUS_MODEL: us.anthropic.claude-opus-4-6-v1
      ANTHROPIC_DEFAULT_SONNET_MODEL: us.anthropic.claude-sonnet-4-6
      ANTHROPIC_DEFAULT_HAIKU_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/configure-aws-credentials
        with:
          roleName: AwsLcIntegrationAutofixRole
      - uses: ./.github/actions/fetch-github-token
      - run: npm install -g @anthropic-ai/claude-code
      - run: |
          set -exo pipefail
          chmod +x "$AUTOFIX_SCRIPT"
          IFS='|' read -r integration version <<< "$TARGET"
          "$AUTOFIX_SCRIPT" fix "$integration" "$version" "$TARGET_RUN_ID"
        env:
          TARGET: ${{ matrix.target }}
