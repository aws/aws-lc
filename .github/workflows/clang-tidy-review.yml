name: clang-tidy-review
on: [pull_request]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '>=1.18'
      - uses: ZedThree/clang-tidy-review@v0.23.1
        with:
          split_workflow: true
          clang_tidy_version: 19
          install_commands: /github/workspace/util/build_compilation_database.sh
          config_file: '/github/workspace/.clang-tidy'
      - uses: ZedThree/clang-tidy-review/upload@v0.23.1
